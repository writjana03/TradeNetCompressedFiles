<div class="register-container">
  <div class="register-card">
    <div class="card shadow-lg p-5">
      <div class="text-center mb-5">
        <div class="logo-placeholder">
          <i class="fas fa-user-plus fa-3x text-primary"></i>
        </div>
        <h4 class="fw-bold text-dark mt-3 mb-2">Create Account</h4>
        <p class="text-muted small">Join TradeNet and expand your business</p>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <strong>{{ errorMessage }}</strong>
        <button type="button" class="btn-close" (click)="errorMessage=''" aria-label="Close"></button>
      </div>

      <!-- Registration Form -->
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="fullName" class="form-label small fw-bold">Full Name</label>
          <input 
            type="text" 
            id="fullName"
            class="form-control rounded-3 py-2"
            [(ngModel)]="fullName" 
            name="fullName"
            placeholder="John Doe" 
            required>
        </div>

        <div class="mb-3">
          <label for="businessName" class="form-label small fw-bold">Business Name</label>
          <input 
            type="text" 
            id="businessName"
            class="form-control rounded-3 py-2"
            [(ngModel)]="businessName" 
            name="businessName"
            placeholder="Your Business Inc." 
            required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label small fw-bold">Email Address</label>
          <input 
            type="email" 
            id="email"
            class="form-control rounded-3 py-2"
            [(ngModel)]="email" 
            name="email"
            placeholder="business@example.com" 
            required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label small fw-bold">Password</label>
          <div class="input-group">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              id="password"
              class="form-control rounded-start-3 py-2"
              [(ngModel)]="password" 
              name="password"
              placeholder="Min 8 characters" 
              required>
            <button 
              class="btn btn-outline-secondary rounded-end-3" 
              type="button"
              (click)="togglePasswordVisibility()">
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label small fw-bold">Confirm Password</label>
          <div class="input-group">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'" 
              id="confirmPassword"
              class="form-control rounded-start-3 py-2"
              [class.is-invalid]="passwordMismatch"
              [(ngModel)]="confirmPassword" 
              name="confirmPassword"
              placeholder="Confirm password" 
              required>
            <button 
              class="btn btn-outline-secondary rounded-end-3" 
              type="button"
              (click)="toggleConfirmPasswordVisibility()">
              <i [class]="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <div *ngIf="passwordMismatch" class="text-danger small mt-1">
            <i class="fas fa-exclamation-circle me-1"></i>Passwords do not match
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check">
            <input 
              class="form-check-input" 
              type="checkbox" 
              id="agreeTerms"
              [(ngModel)]="agreeTerms"
              name="agreeTerms"
              required>
            <label class="form-check-label small" for="agreeTerms">
              I agree to the
              <a href="#" class="text-decoration-none" style="color:#0066cc;">Terms & Conditions</a>
              and
              <a href="#" class="text-decoration-none" style="color:#0066cc;">Privacy Policy</a>
            </label>
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-primary w-100 rounded-pill py-2 shadow-sm fw-bold"
          [disabled]="isLoading || !isFormValid">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <!-- Login Link -->
      <div class="text-center mt-4">
        <p class="small text-muted mb-0">
          Already have an account?
          <a routerLink="/login" class="fw-bold text-decoration-none" style="color:#0066cc;">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>

<style>
  .register-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    padding: 20px;
  }

  .register-card {
    width: 100%;
    max-width: 500px;
  }

  .card {
    border: none;
    border-radius: 15px;
    background: white;
  }

  .logo-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    margin: 0 auto;
    background: #f0f0f0;
    border-radius: 50%;
  }

  .form-control, .input-group-text {
    border: 1px solid #ddd;
    font-size: 0.95rem;
  }

  .form-control:focus {
    border-color: #0066cc;
    box-shadow: 0 0 0 0.2rem rgba(0, 102, 204, 0.25);
  }

  .form-control.is-invalid {
    border-color: #dc3545;
  }

  .btn-primary {
    background-color: #0066cc;
    border-color: #0066cc;
    transition: all 0.3s ease;
  }

  .btn-primary:hover:not(:disabled) {
    background-color: #0052a3;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 102, 204, 0.4);
  }

  .btn-primary:disabled {
    background-color: #ccc;
    border-color: #ccc;
    cursor: not-allowed;
  }

  @media (max-width: 768px) {
    .register-container {
      min-height: auto;
      padding: 30px 20px;
    }

    .card {
      padding: 25px 20px !important;
    }

    .logo-placeholder {
      width: 70px;
      height: 70px;
    }

    h4 {
      font-size: 1.3rem !important;
    }
  }
</style>
